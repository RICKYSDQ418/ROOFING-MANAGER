        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {

            --border: #2d3848; --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #6e7681;
            --accent-blue: #58a6ff; --accent-green: #3fb950; --accent-yellow: #d29922; --accent-red: #f85149;
            --accent-purple: #bc8cff; --accent-orange: #ff8c42; --shadow: rgba(0, 0, 0, 0.5); --glow: rgba(88, 166, 255, 0.15);
        }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        .app-header { background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%); border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px var(--shadow); }
        .header-content { max-width: 1600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }
        .logo h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-tabs { display: flex; gap: 0.5rem; background: var(--bg-card); padding: 0.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .nav-tab { padding: 0.75rem 1.5rem; border: none; background: transparent; color: var(--text-secondary); font-size: 0.95rem; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; white-space: nowrap; }
        .nav-tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-tab.active { background: var(--accent-blue); color: white; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: #4a8fd9; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); transform: translateY(-2px); }
        .btn-success { background: var(--accent-green); color: white; }
        .btn-danger { background: var(--accent-red); color: white; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
        .main-container { max-width: 1600px; margin: 0 auto; padding: 2rem; }
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.3s ease; }
        .stat-card:hover { border-color: var(--accent-blue); box-shadow: 0 4px 20px var(--glow); transform: translateY(-2px); }
        .stat-label { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; backdrop-filter: blur(4px); }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .modal-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.5rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 0.5rem; line-height: 1; }
        .modal-body { padding: 2rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-label { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; transition: all 0.3s ease; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--glow); }

        .form-checkbox { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
        .filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }

        .filter-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }

        .project-card:hover { border-color: var(--accent-blue); box-shadow: 0 8px 30px var(--glow); transform: translateY(-4px); }
        .project-card:hover::before { opacity: 1; }
        .project-card.ready::before { background: var(--accent-green); }
        .project-card.polaron::before { background: var(--accent-orange); }
        .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .project-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

        .badge.polaron { background: rgba(255, 140, 66, 0.15); color: var(--accent-orange); border: 1px solid var(--accent-orange); }
        .badge.team { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); border: 1px solid var(--accent-blue); }

        .weather-header { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .weather-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; }
        .weather-day { text-align: center; padding: 0.5rem 0.25rem; background: var(--bg-card); border-radius: 6px; border: 1px solid var(--border); transition: all 0.3s ease; }
        .weather-day.rain { border-color: var(--accent-red); background: rgba(248, 81, 73, 0.1); }
        .weather-day.good { border-color: var(--accent-green); background: rgba(63, 185, 80, 0.05); }
        .weather-date { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .weather-icon { font-size: 1.5rem; margin: 0.25rem 0; }
        .weather-temp { font-size: 0.75rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .weather-desc { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.25rem; }
        .calendar-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .team-schedule { margin-bottom: 3rem; }
        .team-header { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
        .schedule-timeline { display: flex; gap: 0.5rem; overflow-x: auto; padding: 1rem 0; }
        .timeline-date { min-width: 100px; flex-shrink: 0; }
        .date-header { text-align: center; padding: 0.5rem; background: var(--bg-tertiary); border-radius: 8px 8px 0 0; border: 1px solid var(--border); font-size: 0.875rem; font-weight: 600; }
        .date-slot { min-height: 150px; background: var(--bg-tertiary); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 0.5rem; }
        .date-slot.droppable { background: rgba(88, 166, 255, 0.1); border-color: var(--accent-blue); }
        .schedule-project { background: var(--accent-blue); padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; cursor: move; margin-bottom: 0.5rem; transition: all 0.3s ease; position: relative; }
        .schedule-project .extend-handle { position: absolute; right: 0; top: 0; bottom: 0; width: 10px; cursor: col-resize; background: rgba(255,255,255,0.25); border-radius: 0 6px 6px 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; opacity: 0; transition: opacity 0.2s; }
        .schedule-project:hover .extend-handle { opacity: 1; }
        .cal-multiday { background: var(--accent-blue); border-radius: 6px; font-size: 0.8rem; padding: 0.4rem 0.6rem; margin-bottom: 0.3rem; cursor: move; position: relative; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cal-multiday.polaron { background: var(--accent-orange); }
        .cal-multiday.ready { background: var(--accent-green); }
        .cal-multiday.start { border-radius: 6px 0 0 6px; }
        .cal-multiday.middle { border-radius: 0; margin-left: -1px; margin-right: -1px; opacity: 0.85; }
        .cal-multiday.end { border-radius: 0 6px 6px 0; }
        .cal-multiday.single { border-radius: 6px; }
        .schedule-project:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }
        .schedule-project.dragging { opacity: 0.5; }
        .schedule-project.polaron { background: var(--accent-orange); }
        .schedule-project.ready { background: var(--accent-green); }
        .project-mini-info { font-size: 0.75rem; margin-top: 0.25rem; opacity: 0.9; }
        .unscheduled-projects { margin-top: 2rem; padding: 1.5rem; background: var(--bg-tertiary); border-radius: 12px; border: 1px solid var(--border); }
        .unscheduled-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .map-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; height: 600px; }
        #map { width: 100%; height: 100%; }
        .action-bar { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
        @media (max-width: 768px) {
            .projects-grid { grid-template-columns: 1fr; }
            .weather-days { grid-template-columns: repeat(4, 1fr); }
        }
        #dom-toast { display:none; position: fixed; bottom: 2rem; right: 2rem; background: #3fb950; color: white; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; font-size: 0.95rem; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: opacity 0.3s; }
    </style>

        const STORAGE_KEY = 'roofing_projects';
        const DATA_VERSION_KEY = 'roofing_data_version';
        const CURRENT_DATA_VERSION = 'v20260408_54projects';
        const GEOCODE_CACHE_KEY = 'geocode_cache';
        const TEAMS_KEY = 'nsroofing_teams';
        const DEFAULT_TEAMS = [
            { key: 'wang', label: '王队', color: '#58a6ff', icon: '👷' },
            { key: 'si',   label: '司队', color: '#bc8cff', icon: '🔧' },
        ];
        const loadTeams = () => { try { const t = JSON.parse(localStorage.getItem(TEAMS_KEY)); return (t && t.length > 0) ? t : DEFAULT_TEAMS; } catch(e) { return DEFAULT_TEAMS; } };
        const saveTeams = (t) => localStorage.setItem(TEAMS_KEY, JSON.stringify(t));
        const WEATHER_CACHE_KEY = 'weather_cache_v3';

        const saveToLocalStorage = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        const loadFromLocalStorage = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : null;
        };

        const getGeocodeCache = () => {
            const cache = localStorage.getItem(GEOCODE_CACHE_KEY);
            return cache ? JSON.parse(cache) : {};
        };

        const saveGeocodeCache = (cache) => localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(cache));

        const getWeatherCache = () => {
            const cache = localStorage.getItem(WEATHER_CACHE_KEY);
            if (!cache) return {};
            const parsed = JSON.parse(cache);
            const now = Date.now();
            Object.keys(parsed).forEach(key => {
                if (now - parsed[key].timestamp > 3 * 60 * 60 * 1000) { // 3小时过期
                    delete parsed[key];
                }
            });
            return parsed;
        };

        const saveWeatherCache = (address, data) => {
            const cache = getWeatherCache();
            cache[address] = { data, timestamp: Date.now() };
            localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(cache));
        };

        // 地理编码
        const geocodeAddress = async (address) => {
            const cache = getGeocodeCache();
            if (cache[address]) return cache[address];

            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
                    { headers: { 'User-Agent': 'Halifax-Roofing-Manager' } }
                );
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    cache[address] = coords;
                    saveGeocodeCache(cache);
                    return coords;
                }
                return { lat: 44.6488, lng: -63.5752 };
            } catch (error) {
                console.error('Geocoding error:', error);
                return { lat: 44.6488, lng: -63.5752 };
            }
        };

        // 天气图标映射
        const getWeatherIcon = (weatherId) => {
            if (weatherId >= 200 && weatherId < 300) return '⛈️'; // 雷暴
            if (weatherId >= 300 && weatherId < 400) return '🌦️'; // 毛毛雨
            if (weatherId >= 500 && weatherId < 600) return '🌧️'; // 雨
            if (weatherId >= 600 && weatherId < 700) return '🌨️'; // 雪
            if (weatherId >= 700 && weatherId < 800) return '🌫️'; // 雾霾
            if (weatherId === 800) return '☀️'; // 晴天
            if (weatherId === 801) return '🌤️'; // 少云
            if (weatherId === 802) return '⛅'; // 多云
            if (weatherId === 803 || weatherId === 804) return '☁️'; // 阴天
            return '🌤️';
        };

        // OpenWeatherMap 5天天气预报API
        const getWeatherForecast = async (address) => {
            const cache = getWeatherCache();
            if (cache[address]) {
                return cache[address].data;
            }

            try {
                const coords = await geocodeAddress(address);
                
                // OpenWeatherMap 5天预报API（3小时间隔，免费）
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${coords.lat}&lon=${coords.lng}&appid=${WEATHER_API_KEY}&units=metric&lang=zh_cn`
                );

                if (!response.ok) {
                    console.error('OpenWeatherMap API error:', response.status);
                    return null;
                }

                const data = await response.json();
                
                // 处理返回数据 - 按本地日期分组，每天取中午最近时段
                const dailyForecasts = {};
                data.list.forEach(item => {
                    const date = new Date(item.dt * 1000);
                    // 用本地日期作为key，避免UTC和本地时区造成重复
                    const localDateKey = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
                    const hour = date.getHours();
                    const existingHour = dailyForecasts[localDateKey] ? new Date(dailyForecasts[localDateKey].fullDate).getHours() : -1;
                    // 优先取12点数据，否则取最接近12点的
                    const betterHour = !dailyForecasts[localDateKey] || 
                        Math.abs(hour - 12) < Math.abs(existingHour - 12);
                    if (betterHour) {
                        const weatherId = item.weather[0].id;
                        const isRain = weatherId >= 200 && weatherId < 700;
                        dailyForecasts[localDateKey] = {
                            date: date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }),
                            fullDate: date,
                            temp: Math.round(item.main.temp),
                            tempMin: Math.round(item.main.temp_min),
                            tempMax: Math.round(item.main.temp_max),
                            condition: item.weather[0].description,
                            weatherId: weatherId,
                            icon: getWeatherIcon(weatherId),
                            canWork: !isRain && item.main.temp > -5,
                            humidity: item.main.humidity,
                            windSpeed: item.wind.speed
                        };
                    }
                });

                const forecast = Object.values(dailyForecasts).slice(0, 7);
                saveWeatherCache(address, forecast);
                return forecast;
            } catch (error) {
                console.error('Weather forecast error:', error);
                return null;
            }
        };

        const sortProjects = (projects, team) => {
            return projects.filter(p => p.team === team).sort((a, b) => {
                if (a.customer_preferred_time && !b.customer_preferred_time) return -1;
                if (!a.customer_preferred_time && b.customer_preferred_time) return 1;
                if (a.is_polaron && !b.is_polaron) return -1;
                if (!a.is_polaron && b.is_polaron) return 1;
                if (a.contract_date && b.contract_date) {
                    if (a.contract_date < b.contract_date) return -1;
                    if (a.contract_date > b.contract_date) return 1;
                }
                const statusPriority = { '可开工': 1, '待到货': 2, '待订货': 3, '待测量': 4 };
                return (statusPriority[a.status] || 99) - (statusPriority[b.status] || 99);
            });
        };

        const exportMonthlyReport = (projects, month) => {
            // month = 'YYYY-MM'
            const rows = [];
            projects.forEach(p => {
                if (!p.scheduled_dates) return;
                p.scheduled_dates.forEach(seg => {
                    if (!seg.start) return;
                    if (month && !seg.start.startsWith(month)) return;
                    const days = seg.days || p.duration || 1;
                    const workers = p.workers || 1;
                    rows.push({
                        项目ID: p.id, 队伍: p.team, 地址: p.address,
                        类型: p.type, 品牌: p.brand,
                        开始日期: seg.start, 工期天数: days, 施工人数: workers,
                        人工天数合计: days * workers,
                        材料状况: p.material_status, 备注: p.notes
                    });
                });
            });
            if (rows.length === 0) { alert('该月没有排期数据'); return; }
            const ws = XLSX.utils.json_to_sheet(rows);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, month || '全部');
            XLSX.writeFile(wb, `排期报告_${month || '全部'}_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        const exportToExcel = (projects) => {
            const ws = XLSX.utils.json_to_sheet(projects);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Projects");
            XLSX.writeFile(wb, `roofing_projects_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        function App() {

            const [projects, setProjects] = useState([]);

            const [filterStatus, setFilterStatus] = useState('all');
            const [teams, setTeams] = useState(loadTeams);

            const updateTeams = (next) => { setTeams(next); saveTeams(next); };
            const showToast = (msg) => {
                const el = document.getElementById('dom-toast');
                if (el) { el.textContent = msg; el.style.display = 'block'; el.style.opacity = '1'; setTimeout(() => { el.style.opacity = '0'; setTimeout(() => { el.style.display = 'none'; }, 300); }, 2000); }
            };

            useEffect(() => {
                const savedVersion = localStorage.getItem(DATA_VERSION_KEY);
                if (savedVersion !== CURRENT_DATA_VERSION) {
                    // 新版本数据，清除旧缓存，强制加载最新项目列表
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.setItem(DATA_VERSION_KEY, CURRENT_DATA_VERSION);
                    setProjects(INITIAL_PROJECTS);
                } else {
                    const saved = loadFromLocalStorage();
                    setProjects(saved && saved.length > 0 ? saved : INITIAL_PROJECTS);
                }
            }, []);

            useEffect(() => {
                if (projects.length > 0) saveToLocalStorage(projects);
            }, [projects]);

            const addProject = (newProject) => {
                const maxId = projects.length > 0 ? Math.max(...projects.map(p => p.id)) : 0;
                const project = {

        function CalendarView({ projects, setProjects, teams }) {
            const [draggedProject, setDraggedProject] = useState(null);
            const [hoveredDate, setHoveredDate] = useState(null);
            const [resizing, setResizing] = useState(null); // {projectId, segIdx, startX, origDays}
            const [exportMonth, setExportMonth] = useState(() => { const d = new Date(); return d.toISOString().slice(0,7); });

            // Show 21 days
            const dates = Array.from({ length: 21 }, (_, i) => {
                const date = new Date();
                date.setDate(date.getDate() + i);
                return {
                    date, dateString: date.toISOString().split('T')[0],
                    display: date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }),
                    dayOfWeek: ['日','一','二','三','四','五','六'][date.getDay()]
                };
            });

            const addDays = (dateStr, n) => {
                const d = new Date(dateStr);
                d.setDate(d.getDate() + n);
                return d.toISOString().split('T')[0];
            };

            // Get segments for a project that overlap a given date
            const getSegsOnDate = (p, dateStr) => {
                if (!p.scheduled_dates) return [];
                return p.scheduled_dates.map((seg, i) => {
                    if (!seg.start) return null;
                    const days = seg.days || p.duration || 1;
                    const end = addDays(seg.start, days - 1);
                    if (dateStr >= seg.start && dateStr <= end) return { seg, i };
                    return null;
                }).filter(Boolean);
            };

            const isSegStart = (p, dateStr) => {
                if (!p.scheduled_dates) return false;
                return p.scheduled_dates.some(seg => seg.start === dateStr);
            };

            const handleDrop = (e, dateString, team) => {
                e.preventDefault();
                if (!draggedProject || draggedProject.team !== team) { setDraggedProject(null); setHoveredDate(null); return; }
                const segs = draggedProject.scheduled_dates ? [...draggedProject.scheduled_dates] : [];
                segs.push({ start: dateString, days: draggedProject.duration || 1 });
                const updatedP = { ...draggedProject, scheduled_dates: segs, scheduled_date: dateString };
                setProjects(projects.map(p => p.id === draggedProject.id ? updatedP : p));
                saveProjectToFirebase(updatedP);
                setDraggedProject(null); setHoveredDate(null);
            };

            const removeSeg = (projectId, segIdx) => {
                const p = projects.find(x => x.id === projectId);
                if (!p) return;
                const segs = (p.scheduled_dates || []).filter((_, i) => i !== segIdx);
                const updatedP = { ...p, scheduled_dates: segs, scheduled_date: segs.length > 0 ? segs[0].start : null };
                setProjects(projects.map(x => x.id === projectId ? updatedP : x));
                saveProjectToFirebase(updatedP);
            };

            const extendSeg = (projectId, segIdx, extraDays) => {
                const p = projects.find(x => x.id === projectId);
                if (!p || !p.scheduled_dates) return;
                const segs = p.scheduled_dates.map((s, i) => i === segIdx ? { ...s, days: Math.max(1, (s.days || p.duration || 1) + extraDays) } : s);
                const updatedP = { ...p, scheduled_dates: segs };
                setProjects(projects.map(x => x.id === projectId ? updatedP : x));
                saveProjectToFirebase(updatedP);
            };

            const handleDropToUnscheduled = (team) => {
                if (!draggedProject || draggedProject.team !== team) return;
                const updatedP = { ...draggedProject, scheduled_dates: [], scheduled_date: null };
                setProjects(projects.map(p => p.id === draggedProject.id ? updatedP : p));
                saveProjectToFirebase(updatedP);
                setDraggedProject(null);
            };

            const getUnscheduledProjects = (team) => sortProjects(projects, team).filter(p => !p.scheduled_dates || p.scheduled_dates.length === 0);
            const getScheduledProjects = (team) => projects.filter(p => p.team === team && p.scheduled_dates && p.scheduled_dates.length > 0);

            return (
                <div className="calendar-container">
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1rem', flexWrap:'wrap', gap:'1rem'}}>
                        <div>
                            <h2 style={{marginBottom:'0.25rem'}}>📅 拖拽排期日历</h2>
                            <p style={{color:'var(--text-muted)', fontSize:'0.875rem'}}>💡 拖项目到日期排期 • 点 ✕ 删除某段 • 点 ＋ 延长一天</p>
                        </div>
                        <div style={{display:'flex', gap:'0.75rem', alignItems:'center'}}>
                            <input type="month" value={exportMonth} onChange={e => setExportMonth(e.target.value)}
                                style={{background:'var(--bg-tertiary)', border:'1px solid var(--border)', color:'var(--text-primary)', padding:'0.5rem 0.75rem', borderRadius:'8px', fontSize:'0.875rem'}} />
                            <button className="btn btn-secondary" style={{fontSize:'0.875rem', padding:'0.5rem 1rem'}}
                                onClick={() => exportMonthlyReport(projects, exportMonth)}>📥 导出月报</button>
                        </div>
                    </div>

                    {(teams || []).map((teamObj) => { const team = teamObj.label; return (
                        <div key={team} className="team-schedule">
                            <div className="team-header" style={{color: teamObj.color}}>
                                {teamObj.icon} {team}排期
                            </div>
                            <div className="schedule-timeline">
                                {dates.map(d => (
                                    <div key={d.dateString} className="timeline-date">
                                        <div className="date-header" style={{background: d.date.getDay()===0||d.date.getDay()===6 ? 'rgba(248,81,73,0.15)':''}}>
                                            {d.display}<br/>
                                            <span style={{fontSize:'0.7rem', opacity:0.7}}>周{d.dayOfWeek}</span>
                                        </div>
                                        <div
                                            className={`date-slot ${hoveredDate === d.dateString && draggedProject?.team === team ? 'droppable' : ''}`}
                                            style={{minHeight:'80px'}}
                                            onDragOver={(e) => { e.preventDefault(); setHoveredDate(d.dateString); }}
                                            onDrop={(e) => handleDrop(e, d.dateString, team)}
                                        >
                                            {getScheduledProjects(team).map(p => {
                                                const hits = getSegsOnDate(p, d.dateString);
                                                return hits.map(({ seg, i }) => {
                                                    const days = seg.days || p.duration || 1;
                                                    const isStart = seg.start === d.dateString;
                                                    const isEnd = addDays(seg.start, days-1) === d.dateString;
                                                    const cls = isStart && isEnd ? 'single' : isStart ? 'start' : isEnd ? 'end' : 'middle';
                                                    return (
                                                        <div key={`${p.id}-${i}`}
                                                            className={`cal-multiday ${cls} ${p.is_polaron?'polaron':''} ${p.status==='可开工'?'ready':''}`}
                                                            draggable={isStart}
                                                            onDragStart={() => isStart && setDraggedProject(p)}
                                                            onDragEnd={() => { setDraggedProject(null); setHoveredDate(null); }}
                                                            title={`#${p.id} ${p.address}
${days}天 ${p.workers||'?'}人`}
                                                            style={{color:'white'}}
                                                        >
                                                            {isStart && (
                                                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', gap:'0.25rem'}}>
                                                                    <span style={{overflow:'hidden', textOverflow:'ellipsis', flex:1}}>
                                                                        <strong>#{p.id}</strong> {p.address.substring(0,15)}…
                                                                    </span>
                                                                    <div style={{display:'flex', gap:'0.2rem', flexShrink:0}}>
                                                                        <button onClick={(e)=>{e.stopPropagation(); extendSeg(p.id,i,1);}}
                                                                            title="延长1天"
                                                                            style={{background:'rgba(255,255,255,0.2)', border:'none', color:'white', borderRadius:'3px', padding:'0 4px', cursor:'pointer', fontSize:'0.7rem', lineHeight:'1.4'}}>＋</button>
                                                                        <button onClick={(e)=>{e.stopPropagation(); extendSeg(p.id,i,-1);}}
                                                                            title="缩短1天"
                                                                            style={{background:'rgba(255,255,255,0.2)', border:'none', color:'white', borderRadius:'3px', padding:'0 4px', cursor:'pointer', fontSize:'0.7rem', lineHeight:'1.4'}}>－</button>
                                                                        <button onClick={(e)=>{e.stopPropagation(); removeSeg(p.id,i);}}
                                                                            title="删除此段排期"
                                                                            style={{background:'rgba(248,81,73,0.5)', border:'none', color:'white', borderRadius:'3px', padding:'0 4px', cursor:'pointer', fontSize:'0.7rem', lineHeight:'1.4'}}>✕</button>
                                                                    </div>
                                                                </div>
                                                            )}
                                                            {isStart && (
                                                                <div style={{fontSize:'0.68rem', opacity:0.85, marginTop:'0.15rem'}}>
                                                                    {days}天 {p.workers ? p.workers+'人' : ''}
                                                                </div>
                                                            )}
                                                        </div>
                                                    );
                                                });
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="unscheduled-projects"
                                onDragOver={e => e.preventDefault()}
                                onDrop={() => handleDropToUnscheduled(team)}
                            >
                                <div style={{fontSize:'1rem', fontWeight:'600', marginBottom:'1rem', color:'var(--text-muted)'}}>📋 未排期项目（可拖入日历，可多次拖入创建多段）</div>
                                <div className="unscheduled-grid">
                                    {getUnscheduledProjects(team).map(p => (
                                        <div key={p.id}
                                            className={`schedule-project ${p.is_polaron?'polaron':''} ${p.status==='可开工'?'ready':''} ${draggedProject?.id===p.id?'dragging':''}`}
                                            draggable
                                            onDragStart={() => setDraggedProject(p)}
                                            onDragEnd={() => { setDraggedProject(null); setHoveredDate(null); }}
                                        >
                                            <strong>#{p.id}</strong> {p.address.substring(0,22)}…
                                            <div className="project-mini-info">{p.status} • {p.duration}天 {p.workers?'• '+p.workers+'人':''}</div>
                                        </div>
                                    ))}
                                    {/* Already-scheduled projects can also be re-dragged from here */}
                                    {projects.filter(p => p.team===team && p.scheduled_dates && p.scheduled_dates.length>0).map(p => (
                                        <div key={`copy-${p.id}`}
                                            className={`schedule-project ${p.is_polaron?'polaron':''} ${p.status==='可开工'?'ready':''}`}
                                            draggable
                                            onDragStart={() => setDraggedProject(p)}
                                            onDragEnd={() => { setDraggedProject(null); setHoveredDate(null); }}
                                            style={{opacity:0.6, borderStyle:'dashed'}}
                                            title="拖到新日期添加一段排期"
                                        >
                                            ＋ <strong>#{p.id}</strong> {p.address.substring(0,18)}…
                                            <div className="project-mini-info">再加一段 • {p.duration}天</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    );})}
                </div>
            );
        }

        function MapView({ projects }) {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);

            useEffect(() => {
                const initMap = async () => {
                    if (mapRef.current && !mapInstanceRef.current) {
                        const map = L.map(mapRef.current).setView([44.6488, -63.5752], 10);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap',
                            maxZoom: 19
                        }).addTo(map);
                        mapInstanceRef.current = map;

                        for (const project of projects) {
                            const coords = await geocodeAddress(project.address);
                            const color = project.status === '可开工' ? '#3fb950' : project.is_polaron ? '#ff8c42' : '#58a6ff';
                            
                            const icon = L.divIcon({
                                className: 'custom-marker',
                                html: `<div style="background:${color};width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:13px;">${project.id}</div>`,
                                iconSize: [32, 32]
                            });

                            const marker = L.marker([coords.lat, coords.lng], { icon }).addTo(map);
                            marker.bindPopup(`<div style="color:#333;font-family:'DM Sans',sans-serif;min-width:200px;"><strong style="font-size:15px;display:block;margin-bottom:8px;">#${project.id} - ${project.team}</strong><div style="font-size:12px;line-height:1.6;"><div>📍 ${project.address}</div><div>🏗️ ${project.type}/${project.brand}</div><div>⏱️ ${project.duration}天</div><div>📊 <strong style="color:${project.status==='可开工'?'#3fb950':'#d29922'};">${project.status}</strong></div>${project.is_polaron?'<div style="color:#ff8c42;font-weight:600;">⚡ Polaron</div>':''}</div></div>`);
                        }
                    }
                };
                initMap();
                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, [projects]);

            return (
                <div>
                    <h2 style={{marginBottom: '1rem'}}>🗺️ 项目地图</h2>
                    <p style={{color: 'var(--text-muted)', marginBottom: '1.5rem'}}>💡 OpenStreetMap免费地图 + Nominatim地理编码</p>
                    <div className="map-container"><div ref={mapRef} id="map"></div></div>
                </div>
            );
        }


        function CrewView({ teams, updateTeams, projects, setProjects }) {
            const CREW_KEY = 'nsroofing_crew';
            const loadCrew = () => {
                try {
                    const saved = JSON.parse(localStorage.getItem(CREW_KEY)) || {};
                    // ensure all current teams have an array
                    const result = {};
                    teams.forEach(t => { result[t.key] = saved[t.key] || []; });
                    return result;
                } catch(e) {
                    const result = {};
                    teams.forEach(t => { result[t.key] = []; });
                    return result;
                }
            };
            const saveCrew = (data) => localStorage.setItem(CREW_KEY, JSON.stringify(data));

            const [crew, setCrew] = React.useState(loadCrew);
            const [newName, setNewName] = React.useState('');
            const [newRole, setNewRole] = React.useState('安装工');
            const [newPhone, setNewPhone] = React.useState('');
            const [addingTo, setAddingTo] = React.useState(null);
            const [dragPerson, setDragPerson] = React.useState(null);
            const [dragFrom, setDragFrom] = React.useState(null);
            const [newTeamLabel, setNewTeamLabel] = React.useState('');
            const [showAddTeam, setShowAddTeam] = React.useState(false);

            const updateCrew = (next) => { setCrew(next); saveCrew(next); };

            const addTeam = () => {
                if (!newTeamLabel.trim()) return;
                const label = newTeamLabel.trim();
                if (teams.find(t => t.label === label)) return;
                const colors = ['#ff8c42','#3fb950','#f85149','#d29922','#58a6ff','#bc8cff'];
                const icons = ['🏗️','⚒️','🔨','🪚','🛠️','👷'];
                const key = 'team_' + Date.now();
                const color = colors[teams.length % colors.length];
                const icon = icons[teams.length % icons.length];
                const newTeam = { key, label, color, icon };
                updateTeams([...teams, newTeam]);
                const newCrew = { ...crew, [key]: [] };
                updateCrew(newCrew);
                // update any projects that might belong to this team name
                setNewTeamLabel('');
                setShowAddTeam(false);
            };

            const removeTeam = (teamKey) => {
                const team = teams.find(t => t.key === teamKey);
                if (!team) return;
                if (!confirm(`确定删除「${team.label}」队伍？该队伍下的项目将变为未分配。`)) return;
                // unassign projects from this team
                const updatedProjects = projects.map(p => p.team === team.label ? { ...p, team: '' } : p);
                setProjects(updatedProjects);
                updatedProjects.forEach(p => { if (p.team === '') saveProjectToFirebase(p); });
                updateTeams(teams.filter(t => t.key !== teamKey));
                const newCrew = { ...crew };
                delete newCrew[teamKey];
                updateCrew(newCrew);
            };

            const addPerson = (teamKey) => {
                if (!newName.trim()) return;
                const person = { id: Date.now(), name: newName.trim(), role: newRole, phone: newPhone.trim() };
                const next = { ...crew, [teamKey]: [...(crew[teamKey] || []), person] };
                updateCrew(next);
                setNewName(''); setNewPhone(''); setAddingTo(null);
            };

            const removePerson = (teamKey, id) => {
                const next = { ...crew, [teamKey]: (crew[teamKey] || []).filter(p => p.id !== id) };
                updateCrew(next);
            };

            const setLeader = (teamKey, id) => {
                const next = { ...crew, [teamKey]: (crew[teamKey] || []).map(p => ({ ...p, isLeader: p.id === id })) };
                updateCrew(next);
            };

            const handleDrop = (toKey) => {
                if (!dragPerson || dragFrom === toKey) return;
                const person = (crew[dragFrom] || []).find(p => p.id === dragPerson);
                if (!person) return;
                const next = {
                    ...crew,
                    [dragFrom]: (crew[dragFrom] || []).filter(p => p.id !== dragPerson),
                    [toKey]: [...(crew[toKey] || []), { ...person, isLeader: false }]
                };
                updateCrew(next);
                setDragPerson(null); setDragFrom(null);
            };

            return (
                <div>
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.5rem'}}>
                        <h2>👷 施工人员管理</h2>
                        <button onClick={() => setShowAddTeam(!showAddTeam)}
                            style={{background:'var(--accent-blue)', color:'white', border:'none', borderRadius:'8px', padding:'0.6rem 1.2rem', fontWeight:'600', cursor:'pointer', fontSize:'0.9rem'}}>
                            ＋ 添加队伍
                        </button>
                    </div>
                    <p style={{color: 'var(--text-muted)', marginBottom: showAddTeam ? '1rem' : '2rem', fontSize: '0.9rem'}}>可拖拽人员在队伍间调动，点击⭐设为队长</p>

                    {showAddTeam && (
                        <div style={{background:'var(--bg-card)', border:'1px solid var(--accent-blue)', borderRadius:'10px', padding:'1rem 1.5rem', marginBottom:'1.5rem', display:'flex', gap:'1rem', alignItems:'center', flexWrap:'wrap'}}>
                            <input placeholder="新队伍名称，例如：李队" value={newTeamLabel} onChange={e => setNewTeamLabel(e.target.value)}
                                onKeyDown={e => e.key === 'Enter' && addTeam()}
                                style={{background:'var(--bg-tertiary)', border:'1px solid var(--border)', color:'var(--text-primary)', padding:'0.6rem 1rem', borderRadius:'6px', fontSize:'0.95rem', minWidth:'200px'}} />
                            <button onClick={addTeam}
                                style={{background:'var(--accent-blue)', color:'white', border:'none', borderRadius:'6px', padding:'0.6rem 1.2rem', fontWeight:'600', cursor:'pointer'}}>确认</button>
                            <button onClick={() => { setShowAddTeam(false); setNewTeamLabel(''); }}
                                style={{background:'var(--bg-tertiary)', color:'var(--text-muted)', border:'1px solid var(--border)', borderRadius:'6px', padding:'0.6rem 1rem', cursor:'pointer'}}>取消</button>
                        </div>
                    )}

                    <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(300px, 1fr))', gap:'1.5rem'}}>
                        {teams.map(team => (
                            <div key={team.key}
                                style={{background:'var(--bg-card)', border:`2px solid var(--border)`, borderRadius:'12px', padding:'1.5rem', minHeight:'280px'}}
                                onDragOver={e => e.preventDefault()}
                                onDrop={() => handleDrop(team.key)}
                            >
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'1.2rem', paddingBottom:'0.75rem', borderBottom:`2px solid ${team.color}`}}>
                                    <span style={{fontSize:'1.1rem', fontWeight:'700', color: team.color}}>{team.icon} {team.label}</span>
                                    <div style={{display:'flex', alignItems:'center', gap:'0.5rem'}}>
                                        <span style={{background:'var(--bg-tertiary)', borderRadius:'20px', padding:'0.2rem 0.75rem', fontSize:'0.8rem', color:'var(--text-muted)'}}>{(crew[team.key] || []).length} 人</span>
                                        <button onClick={() => removeTeam(team.key)} title="删除队伍"
                                            style={{background:'none', border:'none', color:'var(--text-muted)', cursor:'pointer', fontSize:'1rem', opacity:0.5, padding:'0 0.2rem'}}
                                        >✕</button>
                                    </div>
                                </div>

                                {(crew[team.key] || []).length === 0 && (
                                    <div style={{textAlign:'center', color:'var(--text-muted)', padding:'1.5rem 0', fontSize:'0.85rem'}}>暂无人员，可从其他队拖入</div>
                                )}

                                {(crew[team.key] || []).map(person => (
                                    <div key={person.id}
                                        draggable
                                        onDragStart={() => { setDragPerson(person.id); setDragFrom(team.key); }}
                                        onDragEnd={() => { setDragPerson(null); setDragFrom(null); }}
                                        style={{
                                            background: dragPerson === person.id ? 'var(--bg-secondary)' : 'var(--bg-tertiary)',
                                            border: `1px solid ${person.isLeader ? team.color : 'var(--border)'}`,
                                            borderRadius:'8px', padding:'0.65rem 0.9rem',
                                            marginBottom:'0.5rem', cursor:'grab',
                                            display:'flex', alignItems:'center', gap:'0.75rem',
                                            opacity: dragPerson === person.id ? 0.4 : 1,
                                            transition:'all 0.2s'
                                        }}
                                    >
                                        <span style={{fontSize:'1.2rem'}}>{person.isLeader ? '⭐' : '👤'}</span>
                                        <div style={{flex:1}}>
                                            <div style={{fontWeight:'600', fontSize:'0.9rem', display:'flex', alignItems:'center', gap:'0.4rem'}}>
                                                {person.name}
                                                {person.isLeader && <span style={{fontSize:'0.65rem', background: team.color, color:'white', borderRadius:'4px', padding:'0.1rem 0.35rem'}}>队长</span>}
                                            </div>
                                            <div style={{fontSize:'0.75rem', color:'var(--text-muted)', marginTop:'0.1rem'}}>
                                                {person.role}{person.phone ? ' · ' + person.phone : ''}
                                            </div>
                                        </div>
                                        <div style={{display:'flex', gap:'0.3rem'}}>
                                            <button onClick={() => setLeader(team.key, person.id)} title={person.isLeader ? '已是队长' : '设为队长'}
                                                style={{background:'none', border:'none', cursor:'pointer', fontSize:'1rem', opacity: person.isLeader ? 1 : 0.35, transition:'opacity 0.2s'}}>⭐</button>
                                            <button onClick={() => removePerson(team.key, person.id)}
                                                style={{background:'none', border:'none', cursor:'pointer', color:'var(--accent-red)', fontSize:'1rem'}}>✕</button>
                                        </div>
                                    </div>
                                ))}

                                {addingTo === team.key ? (
                                    <div style={{marginTop:'0.75rem', background:'var(--bg-secondary)', borderRadius:'8px', padding:'0.9rem', border:'1px solid var(--border)'}}>
                                        <input placeholder="姓名 *" value={newName} onChange={e => setNewName(e.target.value)}
                                            style={{width:'100%', marginBottom:'0.4rem', background:'var(--bg-tertiary)', border:'1px solid var(--border)', color:'var(--text-primary)', padding:'0.45rem 0.75rem', borderRadius:'6px', fontSize:'0.88rem'}} />
                                        <select value={newRole} onChange={e => setNewRole(e.target.value)}
                                            style={{width:'100%', marginBottom:'0.4rem', background:'var(--bg-tertiary)', border:'1px solid var(--border)', color:'var(--text-primary)', padding:'0.45rem 0.75rem', borderRadius:'6px', fontSize:'0.88rem'}}>
                                            <option>安装工</option><option>队长</option><option>学徒</option>
                                        </select>
                                        <input placeholder="电话（可选）" value={newPhone} onChange={e => setNewPhone(e.target.value)}
                                            style={{width:'100%', marginBottom:'0.6rem', background:'var(--bg-tertiary)', border:'1px solid var(--border)', color:'var(--text-primary)', padding:'0.45rem 0.75rem', borderRadius:'6px', fontSize:'0.88rem'}} />
                                        <div style={{display:'flex', gap:'0.5rem'}}>
                                            <button onClick={() => addPerson(team.key)}
                                                style={{flex:1, background: team.color, color:'white', border:'none', borderRadius:'6px', padding:'0.45rem', fontWeight:'600', cursor:'pointer', fontSize:'0.88rem'}}>确认</button>
                                            <button onClick={() => { setAddingTo(null); setNewName(''); setNewPhone(''); }}
                                                style={{background:'var(--bg-tertiary)', color:'var(--text-primary)', border:'1px solid var(--border)', borderRadius:'6px', padding:'0.45rem 0.9rem', cursor:'pointer', fontSize:'0.88rem'}}>取消</button>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => setAddingTo(team.key)}
                                        style={{width:'100%', marginTop:'0.75rem', background:'transparent', border:`1px dashed ${team.color}`, color: team.color, borderRadius:'8px', padding:'0.55rem', fontSize:'0.88rem', cursor:'pointer', fontWeight:'600'}}>
                                        ＋ 添加人员
                                    </button>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
<div id="dom-toast"></div>
</body>
</html>
