    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0e14; --bg-secondary: #131920; --bg-tertiary: #1a2028; --bg-card: #1e252e;
            --border: #2d3848; --text-primary: #e6edf3; --text-secondary: #8b949e; --text-muted: #6e7681;
            --accent-blue: #58a6ff; --accent-green: #3fb950; --accent-yellow: #d29922; --accent-red: #f85149;
            --accent-purple: #bc8cff; --accent-orange: #ff8c42; --shadow: rgba(0, 0, 0, 0.5); --glow: rgba(88, 166, 255, 0.15);
        }
        body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        .app-header { background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%); border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px var(--shadow); }
        .header-content { max-width: 1600px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 1rem; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }
        .logo h1 { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-purple) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-tabs { display: flex; gap: 0.5rem; background: var(--bg-card); padding: 0.5rem; border-radius: 12px; border: 1px solid var(--border); }
        .nav-tab { padding: 0.75rem 1.5rem; border: none; background: transparent; color: var(--text-secondary); font-size: 0.95rem; font-weight: 500; cursor: pointer; border-radius: 8px; transition: all 0.3s ease; white-space: nowrap; }
        .nav-tab:hover { background: var(--bg-tertiary); color: var(--text-primary); }
        .nav-tab.active { background: var(--accent-blue); color: white; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }
        .btn { padding: 0.75rem 1.5rem; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'DM Sans', sans-serif; }
        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: #4a8fd9; box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); transform: translateY(-2px); }
        .btn-success { background: var(--accent-green); color: white; }
        .btn-danger { background: var(--accent-red); color: white; }
        .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
        .main-container { max-width: 1600px; margin: 0 auto; padding: 2rem; }
        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.3s ease; }
        .stat-card:hover { border-color: var(--accent-blue); box-shadow: 0 4px 20px var(--glow); transform: translateY(-2px); }
        .stat-label { font-size: 0.875rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem; }
        .stat-value { font-size: 2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.8); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 2rem; backdrop-filter: blur(4px); }
        .modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5); }
        .modal-header { padding: 1.5rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 1.5rem; font-weight: 700; }
        .modal-close { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 0.5rem; line-height: 1; }
        .modal-body { padding: 2rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .form-group.full-width { grid-column: 1 / -1; }
        .form-label { font-size: 0.875rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-input, .form-select, .form-textarea { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.95rem; font-family: 'DM Sans', sans-serif; transition: all 0.3s ease; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--glow); }

        .form-checkbox { display: flex; align-items: center; gap: 0.75rem; cursor: pointer; }
        .filter-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; display: flex; gap: 1rem; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 0.5rem; }
        .filter-label { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .project-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.3s ease; position: relative; overflow: hidden; }
        .project-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent-blue); opacity: 0; transition: opacity 0.3s ease; }
        .project-card:hover { border-color: var(--accent-blue); box-shadow: 0 8px 30px var(--glow); transform: translateY(-4px); }
        .project-card:hover::before { opacity: 1; }
        .project-card.ready::before { background: var(--accent-green); }
        .project-card.polaron::before { background: var(--accent-orange); }
        .project-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
        .project-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .badge { padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.status-ready { background: rgba(63, 185, 80, 0.15); color: var(--accent-green); border: 1px solid var(--accent-green); }
        .badge.status-pending { background: rgba(210, 153, 34, 0.15); color: var(--accent-yellow); border: 1px solid var(--accent-yellow); }
        .badge.polaron { background: rgba(255, 140, 66, 0.15); color: var(--accent-orange); border: 1px solid var(--accent-orange); }
        .badge.team { background: rgba(88, 166, 255, 0.15); color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .weather-widget { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-top: 1rem; }
        .weather-header { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; }
        .weather-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; }
        .weather-day { text-align: center; padding: 0.5rem 0.25rem; background: var(--bg-card); border-radius: 6px; border: 1px solid var(--border); transition: all 0.3s ease; }
        .weather-day.rain { border-color: var(--accent-red); background: rgba(248, 81, 73, 0.1); }
        .weather-day.good { border-color: var(--accent-green); background: rgba(63, 185, 80, 0.05); }
        .weather-date { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.25rem; }
        .weather-icon { font-size: 1.5rem; margin: 0.25rem 0; }
        .weather-temp { font-size: 0.75rem; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
        .weather-desc { font-size: 0.6rem; color: var(--text-muted); margin-top: 0.25rem; }
        .calendar-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
        .team-schedule { margin-bottom: 3rem; }
        .team-header { font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 2px solid var(--border); }
        .schedule-timeline { display: flex; gap: 0.5rem; overflow-x: auto; padding: 1rem 0; }
        .timeline-date { min-width: 100px; flex-shrink: 0; }
        .date-header { text-align: center; padding: 0.5rem; background: var(--bg-tertiary); border-radius: 8px 8px 0 0; border: 1px solid var(--border); font-size: 0.875rem; font-weight: 600; }
        .date-slot { min-height: 150px; background: var(--bg-tertiary); border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; padding: 0.5rem; }
        .date-slot.droppable { background: rgba(88, 166, 255, 0.1); border-color: var(--accent-blue); }
        .schedule-project { background: var(--accent-blue); padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; cursor: move; margin-bottom: 0.5rem; transition: all 0.3s ease; }
        .schedule-project:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(88, 166, 255, 0.3); }
        .schedule-project.dragging { opacity: 0.5; }
        .schedule-project.polaron { background: var(--accent-orange); }
        .schedule-project.ready { background: var(--accent-green); }
        .project-mini-info { font-size: 0.75rem; margin-top: 0.25rem; opacity: 0.9; }
        .unscheduled-projects { margin-top: 2rem; padding: 1.5rem; background: var(--bg-tertiary); border-radius: 12px; border: 1px solid var(--border); }
        .unscheduled-grid { display: flex; flex-wrap: wrap; gap: 0.75rem; }
        .map-container { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; height: 600px; }
        #map { width: 100%; height: 100%; }
        .action-bar { display: flex; gap: 1rem; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; }
        @media (max-width: 768px) {
            .projects-grid { grid-template-columns: 1fr; }
            .weather-days { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>

r":"Charcoal","notes":"这家还有一个车库metal和一个siding需要一起做","is_polaron":false,"status":"待订货","construction_status":"未开工"}];

        const STORAGE_KEY = 'roofing_projects';
        const DATA_VERSION_KEY = 'roofing_data_version';
        const CURRENT_DATA_VERSION = 'v20260408_54projects';
        const GEOCODE_CACHE_KEY = 'geocode_cache';
        const WEATHER_CACHE_KEY = 'weather_cache_v2';

        const saveToLocalStorage = (data) => localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        const loadFromLocalStorage = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : null;
        };

        const getGeocodeCache = () => {
            const cache = localStorage.getItem(GEOCODE_CACHE_KEY);
            return cache ? JSON.parse(cache) : {};
        };

        const saveGeocodeCache = (cache) => localStorage.setItem(GEOCODE_CACHE_KEY, JSON.stringify(cache));

        const getWeatherCache = () => {
            const cache = localStorage.getItem(WEATHER_CACHE_KEY);
            if (!cache) return {};
            const parsed = JSON.parse(cache);
            const now = Date.now();
            Object.keys(parsed).forEach(key => {
                if (now - parsed[key].timestamp > 3 * 60 * 60 * 1000) { // 3小时过期
                    delete parsed[key];
                }
            });
            return parsed;
        };

        const saveWeatherCache = (address, data) => {
            const cache = getWeatherCache();
            cache[address] = { data, timestamp: Date.now() };
            localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify(cache));
        };

        // 地理编码
        const geocodeAddress = async (address) => {
            const cache = getGeocodeCache();
            if (cache[address]) return cache[address];

            try {
                await new Promise(resolve => setTimeout(resolve, 1000));
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
                    { headers: { 'User-Agent': 'Halifax-Roofing-Manager' } }
                );
                const data = await response.json();
                
                if (data && data.length > 0) {
                    const coords = { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                    cache[address] = coords;
                    saveGeocodeCache(cache);
                    return coords;
                }
                return { lat: 44.6488, lng: -63.5752 };
            } catch (error) {
                console.error('Geocoding error:', error);
                return { lat: 44.6488, lng: -63.5752 };
            }
        };

        // 天气图标映射
        const getWeatherIcon = (weatherId) => {
            if (weatherId >= 200 && weatherId < 300) return '⛈️'; // 雷暴
            if (weatherId >= 300 && weatherId < 400) return '🌦️'; // 毛毛雨
            if (weatherId >= 500 && weatherId < 600) return '🌧️'; // 雨
            if (weatherId >= 600 && weatherId < 700) return '🌨️'; // 雪
            if (weatherId >= 700 && weatherId < 800) return '🌫️'; // 雾霾
            if (weatherId === 800) return '☀️'; // 晴天
            if (weatherId === 801) return '🌤️'; // 少云
            if (weatherId === 802) return '⛅'; // 多云
            if (weatherId === 803 || weatherId === 804) return '☁️'; // 阴天
            return '🌤️';
        };

        // OpenWeatherMap 5天天气预报API
        const getWeatherForecast = async (address) => {
            const cache = getWeatherCache();
            if (cache[address]) {
                return cache[address].data;
            }

            try {
                const coords = await geocodeAddress(address);
                
                // OpenWeatherMap 5天预报API（3小时间隔，免费）
                const response = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?lat=${coords.lat}&lon=${coords.lng}&appid=${WEATHER_API_KEY}&units=metric&lang=zh_cn`
                );

                if (!response.ok) {
                    console.error('OpenWeatherMap API error:', response.status);
                    return null;
                }

                const data = await response.json();
                
                // 处理返回数据 - 提取每天中午12点的预报
                const dailyForecasts = {};
                data.list.forEach(item => {
                    const date = new Date(item.dt * 1000);
                    const dateKey = date.toISOString().split('T')[0];
                    const hour = date.getHours();
                    
                    // 取每天中午12点的数据，或者如果没有就取第一个
                    if (!dailyForecasts[dateKey] || hour === 12) {
                        const weatherId = item.weather[0].id;
                        const isRain = weatherId >= 200 && weatherId < 700; // 雷暴、毛毛雨、雨、雪都算不适合施工
                        
                        dailyForecasts[dateKey] = {
                            date: date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }),
                            fullDate: date,
                            temp: Math.round(item.main.temp),
                            tempMin: Math.round(item.main.temp_min),
                            tempMax: Math.round(item.main.temp_max),
                            condition: item.weather[0].description,
                            weatherId: weatherId,
                            icon: getWeatherIcon(weatherId),
                            canWork: !isRain && item.main.temp > -5,
                            humidity: item.main.humidity,
                            windSpeed: item.wind.speed
                        };
                    }
                });

                const forecast = Object.values(dailyForecasts).slice(0, 7);
                saveWeatherCache(address, forecast);
                return forecast;
            } catch (error) {
                console.error('Weather forecast error:', error);
                return null;
            }
        };

        const sortProjects = (projects, team) => {
            return projects.filter(p => p.team === team).sort((a, b) => {
                if (a.customer_preferred_time && !b.customer_preferred_time) return -1;
                if (!a.customer_preferred_time && b.customer_preferred_time) return 1;
                if (a.is_polaron && !b.is_polaron) return -1;
                if (!a.is_polaron && b.is_polaron) return 1;
                if (a.contract_date && b.contract_date) {
                    if (a.contract_date < b.contract_date) return -1;
                    if (a.contract_date > b.contract_date) return 1;
                }
                const statusPriority = { '可开工': 1, '待到货': 2, '待订货': 3, '待测量': 4 };
                return (statusPriority[a.status] || 99) - (statusPriority[b.status] || 99);
            });
        };

        const exportToExcel = (projects) => {
            const ws = XLSX.utils.json_to_sheet(projects);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Projects");
            XLSX.writeFile(wb, `roofing_projects_${new Date().toISOString().split('T')[0]}.xlsx`);
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [projects, setProjects] = useState([]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingProject, setEditingProject] = useState(null);
            const [filterTeam, setFilterTeam] = useState('all');
            const [filterStatus, setFilterStatus] = useState('all');

            useEffect(() => {
                const savedVersion = localStorage.getItem(DATA_VERSION_KEY);
                if (savedVersion !== CURRENT_DATA_VERSION) {
                    // 新版本数据，清除旧缓存，强制加载最新项目列表
                    localStorage.removeItem(STORAGE_KEY);
                    localStorage.setItem(DATA_VERSION_KEY, CURRENT_DATA_VERSION);
                    setProjects(INITIAL_PROJECTS);
                } else {
                    const saved = loadFromLocalStorage();
                    setProjects(saved && saved.length > 0 ? saved : INITIAL_PROJECTS);
                }
            }, []);

            useEffect(() => {
                if (projects.length > 0) saveToLocalStorage(projects);
            }, [projects]);

            const addProject = (newProject) => {
                const maxId = projects.length > 0 ? Math.max(...projects.map(p => p.id)) : 0;
                const project = {
                    ...newProject,
                    id: maxId + 1,
                    status: determineStatus(newProject.material_status),
                    construction_status: '未开工',
                    scheduled_date: null
                };
                setProjects([...projects, project]);
                setShowAddModal(false);
            };

            const updateProject = (updatedProject) => {
                const updated = { ...updatedProject, status: determineStatus(updatedProject.material_status) };
                setProjects(projects.map(p => p.id === updatedProject.id ? updated : p));
                saveProjectToFirebase(updated);
                setEditingProject(null);
            };

            const deleteProject = (projectId) => {
                if (confirm('确定要删除这个项目吗？')) {
                    setProjects(projects.filter(p => p.id !== projectId));
                    deleteProjectFromFirebase(projectId);
                }
            };

            const determineStatus = (materialStatus) => {
                const statusMap = {
                    '未测量未定': '待测量', '已测量未定': '待订货',
                    '已定未到': '待到货', '已到仓库': '可开工', '已到现场': '可开工'
                };
                return statusMap[materialStatus] || '待确认';
            };

            const filteredProjects = useMemo(() => {
                let filtered = projects;
                if (filterTeam !== 'all') filtered = filtered.filter(p => p.team === filterTeam);
                if (filterStatus !== 'all') filtered = filtered.filter(p => p.status === filterStatus);
                return filtered;
            }, [projects, filterTeam, filterStatus]);

            const stats = {
                total: projects.length,
                ready: projects.filter(p => p.status === '可开工').length,
                pending: projects.filter(p => p.status !== '可开工').length,
                wang: projects.filter(p => p.team === '王队').length,
                si: projects.filter(p => p.team === '司队').length,
            };

            return (
                <div className="app">
                    <header className="app-header">
                        <div className="header-content">
                            <div className="logo">
                                <div className="logo-icon">🏠</div>
                                <h1>Halifax 屋顶项目管理</h1>
                            </div>
                            <nav className="nav-tabs">
                                <button className={`nav-tab ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>📊 项目看板</button>
                                <button className={`nav-tab ${activeTab === 'calendar' ? 'active' : ''}`} onClick={() => setActiveTab('calendar')}>📅 拖拽排期</button>
                                <button className={`nav-tab ${activeTab === 'map' ? 'active' : ''}`} onClick={() => setActiveTab('map')}>🗺️ 项目地图</button>
                            </nav>
                        </div>
                    </header>

                    <main className="main-container">
                        {activeTab === 'dashboard' && (
                            <Dashboard 
                                projects={filteredProjects} stats={stats}
                                filterTeam={filterTeam} filterStatus={filterStatus}
                                setFilterTeam={setFilterTeam} setFilterStatus={setFilterStatus}
                                onAddProject={() => setShowAddModal(true)}
                                onEditProject={setEditingProject}
                                onDeleteProject={deleteProject}
                                onExport={() => exportToExcel(projects)}
                            />
                        )}
                        {activeTab === 'calendar' && <CalendarView projects={projects} setProjects={setProjects} />}
                        {activeTab === 'map' && <MapView projects={projects} />}
                    </main>

                    {showAddModal && <ProjectModal onClose={() => setShowAddModal(false)} onSave={addProject} />}
                    {editingProject && <ProjectModal project={editingProject} onClose={() => setEditingProject(null)} onSave={updateProject} />}
                </div>
            );
        }

        function Dashboard({ projects, stats, filterTeam, filterStatus, setFilterTeam, setFilterStatus, onAddProject, onEditProject, onDeleteProject, onExport }) {
            return (
                <div>
                    <div className="action-bar">
                        <button className="btn btn-primary" onClick={onAddProject}>➕ 添加新项目</button>
                        <button className="btn btn-secondary" onClick={onExport}>📥 导出Excel</button>
                    </div>

                    <div className="stats-bar">
                        <div className="stat-card">
                            <div className="stat-label">总项目数</div>
                            <div className="stat-value">{stats.total}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">可开工</div>
                            <div className="stat-value" style={{color: 'var(--accent-green)'}}>{stats.ready}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">待准备</div>
                            <div className="stat-value" style={{color: 'var(--accent-yellow)'}}>{stats.pending}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">王队</div>
                            <div className="stat-value" style={{color: 'var(--accent-blue)'}}>{stats.wang}</div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-label">司队</div>
                            <div className="stat-value" style={{color: 'var(--accent-purple)'}}>{stats.si}</div>
                        </div>
                    </div>

                    <div className="filter-bar">
                        <div className="filter-group">
                            <label className="filter-label">队伍</label>
                            <select className="form-select" value={filterTeam} onChange={(e) => setFilterTeam(e.target.value)}>
                                <option value="all">全部</option>
                                <option value="王队">王队</option>
                                <option value="司队">司队</option>
                            </select>
                        </div>
                        <div className="filter-group">
                            <label className="filter-label">状态</label>
                            <select className="form-select" value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)}>
                                <option value="all">全部</option>
                                <option value="可开工">可开工</option>
                                <option value="待到货">待到货</option>
                                <option value="待订货">待订货</option>
                            </select>
                        </div>
                    </div>

                    <div className="projects-grid">
                        {projects.map(p => <ProjectCard key={p.id} project={p} onEdit={() => onEditProject(p)} onDelete={() => onDeleteProject(p.id)} />)}
                    </div>

                    {projects.length === 0 && (
                        <div style={{textAlign: 'center', padding: '4rem', color: 'var(--text-muted)'}}>
                            <div style={{fontSize: '4rem'}}>📋</div>
                            <p>还没有项目，点击"添加新项目"开始</p>
                        </div>
                    )}
                </div>
            );
        }

        function ProjectCard({ project, onEdit, onDelete }) {
            const [weather, setWeather] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                getWeatherForecast(project.address).then(data => {
                    setWeather(data);
                    setLoading(false);
                });
            }, [project.address]);

            return (
                <div className={`project-card ${project.status === '可开工' ? 'ready' : ''} ${project.is_polaron ? 'polaron' : ''}`}>
                    <div className="project-header">
                        <div style={{fontFamily: 'JetBrains Mono', fontSize: '0.75rem', color: 'var(--text-muted)'}}>
                            #{project.id.toString().padStart(3, '0')}
                        </div>
                        <div className="project-badges">
                            <span className="badge team">{project.team}</span>
                            {project.is_polaron && <span className="badge polaron">Polaron</span>}
                            <span className={`badge ${project.status === '可开工' ? 'status-ready' : 'status-pending'}`}>{project.status}</span>
                        </div>
                    </div>

                    <div style={{fontSize: '1rem', fontWeight: '600', marginBottom: '0.75rem', lineHeight: '1.4'}}>
                        {project.address}
                    </div>

                    <div style={{fontSize: '0.875rem', color: 'var(--text-secondary)', marginBottom: '0.5rem'}}>
                        {project.type} / {project.brand} • {project.duration}天 • {project.area || 'N/A'} sq
                    </div>

                    {project.notes && (
                        <div style={{fontSize: '0.75rem', color: 'var(--text-muted)', fontStyle: 'italic', marginBottom: '0.75rem'}}>
                            📝 {project.notes}
                        </div>
                    )}

                    {loading ? (
                        <div style={{textAlign: 'center', padding: '1rem', color: 'var(--text-muted)', fontSize: '0.875rem'}}>
                            加载天气中...
                        </div>
                    ) : weather ? (
                        <div className="weather-widget">
                            <div className="weather-header">
                                <span>🌤️ 未来7天天气</span>
                                <span style={{fontSize: '0.7rem', color: 'var(--text-muted)', fontWeight: 'normal'}}>OpenWeatherMap</span>
                            </div>
                            <div className="weather-days">
                                {weather.map((day, i) => (
                                    <div key={i} className={`weather-day ${day.canWork ? 'good' : 'rain'}`} title={day.condition}>
                                        <div className="weather-date">{day.date}</div>
                                        <div className="weather-icon">{day.icon}</div>
                                        <div className="weather-temp">{day.temp}°C</div>
                                        <div className="weather-desc">{day.condition}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        <div style={{textAlign: 'center', padding: '1rem', color: 'var(--accent-red)', fontSize: '0.875rem'}}>
                            天气加载失败
                        </div>
                    )}

                    <div style={{marginTop: '1rem', display: 'flex', gap: '0.5rem'}}>
                        <button className="btn btn-primary" style={{flex: 1, fontSize: '0.875rem', padding: '0.5rem'}} onClick={onEdit}>✏️ 编辑</button>
                        <button className="btn btn-danger" style={{fontSize: '0.875rem', padding: '0.5rem'}} onClick={onDelete}>🗑️</button>
                    </div>
                </div>
            );
        }

        function ProjectModal({ project, onClose, onSave }) {
            const [formData, setFormData] = useState(project || {
                team: '王队', duration: 1, contract_date: '', customer_preferred_time: '', address: '',
                type: 'Shingle', brand: 'GAF/A', material_quantity: '', material_status: '未测量未定',
                area: '', pitch: '', color: '', notes: '', is_polaron: false
            });

            const handleChange = (field, value) => setFormData({ ...formData, [field]: value });
            const handleSubmit = (e) => { e.preventDefault(); onSave(formData); };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal" onClick={(e) => e.stopPropagation()}>
                        <div className="modal-header">
                            <h2 className="modal-title">{project ? '编辑项目' : '添加新项目'}</h2>
                            <button className="modal-close" onClick={onClose}>×</button>
                        </div>
                        <form className="modal-body" onSubmit={handleSubmit}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label className="form-label">安装队</label>
                                    <select className="form-select" value={formData.team} onChange={(e) => handleChange('team', e.target.value)} required>
                                        <option value="王队">王队</option>
                                        <option value="司队">司队</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">工期(天)</label>
                                    <input className="form-input" type="number" step="0.5" value={formData.duration} onChange={(e) => handleChange('duration', parseFloat(e.target.value))} required />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">签约日期</label>
                                    <input className="form-input" type="date" value={formData.contract_date} onChange={(e) => handleChange('contract_date', e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">客户期望时间</label>
                                    <input className="form-input" type="text" value={formData.customer_preferred_time} onChange={(e) => handleChange('customer_preferred_time', e.target.value)} />
                                </div>
                                <div className="form-group full-width">
                                    <label className="form-label">地址</label>
                                    <input className="form-input" type="text" value={formData.address} onChange={(e) => handleChange('address', e.target.value)} required />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">类型</label>
                                    <select className="form-select" value={formData.type} onChange={(e) => handleChange('type', e.target.value)} required>
                                        <option value="Shingle">Shingle</option>
                                        <option value="Metal">Metal</option>
                                        <option value="地桩">地桩</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">品牌</label>
                                    <select className="form-select" value={formData.brand} onChange={(e) => handleChange('brand', e.target.value)} required>
                                        <option value="GAF/A">GAF/A</option>
                                        <option value="GAF/A+">GAF/A+</option>
                                        <option value="IKO">IKO</option>
                                        <option value="WALLS">WALLS</option>
                                        <option value="其它">其它</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">材料数量</label>
                                    <input className="form-input" type="text" value={formData.material_quantity} onChange={(e) => handleChange('material_quantity', e.target.value)} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">材料状况</label>
                                    <select className="form-select" value={formData.material_status} onChange={(e) => handleChange('material_status', e.target.value)} required>
                                        <option value="未测量未定">未测量未定</option>
                                        <option value="已测量未定">已测量未定</option>
                                        <option value="已定未到">已定未到</option>
                                        <option value="已到仓库">已到仓库</option>
                                        <option value="已到现场">已到现场</option>
                                    </select>
                                </div>
                                <div className="form-group">
                                    <label className="form-label">面积(sq)</label>
                                    <input className="form-input" type="number" step="0.01" value={formData.area} onChange={(e) => handleChange('area', parseFloat(e.target.value))} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">Pitch</label>
                                    <input className="form-input" type="number" value={formData.pitch} onChange={(e) => handleChange('pitch', parseInt(e.target.value))} />
                                </div>
                                <div className="form-group">
                                    <label className="form-label">颜色</label>
                                    <input className="form-input" type="text" value={formData.color} onChange={(e) => handleChange('color', e.target.value)} />
                                </div>
                                <div className="form-group full-width">
                                    <label className="form-label">备注</label>
                                    <textarea className="form-textarea" value={formData.notes} onChange={(e) => handleChange('notes', e.target.value)} />
                                </div>
                                <div className="form-group full-width">
                                    <label className="form-checkbox">
                                        <input type="checkbox" checked={formData.is_polaron} onChange={(e) => handleChange('is_polaron', e.target.checked)} />
                                        <span>Polaron项目</span>
                                    </label>
                                </div>
                            </div>
                            <div style={{marginTop: '2rem', display: 'flex', gap: '1rem', justifyContent: 'flex-end'}}>
                                <button type="button" className="btn btn-secondary" onClick={onClose}>取消</button>
                                <button type="submit" className="btn btn-success">保存</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        function CalendarView({ projects, setProjects }) {
            const [draggedProject, setDraggedProject] = useState(null);
            const [hoveredDate, setHoveredDate] = useState(null);
            
            const dates = Array.from({ length: 14 }, (_, i) => {
                const date = new Date();
                date.setDate(date.getDate() + i);
                return {
                    date, dateString: date.toISOString().split('T')[0],
                    display: date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }),
                    dayOfWeek: ['日','一','二','三','四','五','六'][date.getDay()]
                };
            });

            const handleDrop = (e, dateString) => {
                e.preventDefault();
                if (draggedProject) {
                    const updatedP = { ...draggedProject, scheduled_date: dateString };
                    setProjects(projects.map(p => p.id === draggedProject.id ? updatedP : p));
                    saveProjectToFirebase(updatedP);
                }
                setDraggedProject(null);
                setHoveredDate(null);
            };

            const getScheduledProjects = (team, dateString) => projects.filter(p => p.team === team && p.scheduled_date === dateString);
            const getUnscheduledProjects = (team) => sortProjects(projects, team).filter(p => !p.scheduled_date);

            return (
                <div className="calendar-container">
                    <h2 style={{marginBottom: '1.5rem'}}>📅 拖拽排期日历</h2>
                    <p style={{color: 'var(--text-muted)', marginBottom: '2rem'}}>💡 将下方项目拖到对应日期</p>

                    {['王队', '司队'].map((team, idx) => (
                        <div key={team} className="team-schedule">
                            <div className="team-header" style={{color: idx === 0 ? 'var(--accent-blue)' : 'var(--accent-purple)'}}>
                                {idx === 0 ? '👷' : '🔧'} {team}排期
                            </div>
                            <div className="schedule-timeline">
                                {dates.map(d => (
                                    <div key={d.dateString} className="timeline-date">
                                        <div className="date-header">{d.display}<br/><span style={{fontSize: '0.75rem', opacity: 0.7}}>周{d.dayOfWeek}</span></div>
                                        <div 
                                            className={`date-slot ${hoveredDate === d.dateString && draggedProject?.team === team ? 'droppable' : ''}`}
                                            onDragOver={(e) => { e.preventDefault(); setHoveredDate(d.dateString); }}
                                            onDrop={(e) => handleDrop(e, d.dateString)}
                                        >
                                            {getScheduledProjects(team, d.dateString).map(p => (
                                                <div 
                                                    key={p.id}
                                                    className={`schedule-project ${p.is_polaron ? 'polaron' : ''} ${p.status === '可开工' ? 'ready' : ''} ${draggedProject?.id === p.id ? 'dragging' : ''}`}
                                                    draggable
                                                    onDragStart={() => setDraggedProject(p)}
                                                    onDragEnd={() => { setDraggedProject(null); setHoveredDate(null); }}
                                                >
                                                    <strong>#{p.id}</strong> {p.address.substring(0, 20)}...
                                                    <div className="project-mini-info">{p.type} • {p.duration}天</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            <div className="unscheduled-projects">
                                <div style={{fontSize: '1rem', fontWeight: '600', marginBottom: '1rem', color: 'var(--text-muted)'}}>📋 未排期项目</div>
                                <div className="unscheduled-grid">
                                    {getUnscheduledProjects(team).map(p => (
                                        <div 
                                            key={p.id}
                                            className={`schedule-project ${p.is_polaron ? 'polaron' : ''} ${p.status === '可开工' ? 'ready' : ''} ${draggedProject?.id === p.id ? 'dragging' : ''}`}
                                            draggable
                                            onDragStart={() => setDraggedProject(p)}
                                            onDragEnd={() => { setDraggedProject(null); setHoveredDate(null); }}
                                        >
                                            <strong>#{p.id}</strong> {p.address.substring(0, 25)}...
                                            <div className="project-mini-info">{p.status} • {p.duration}天</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function MapView({ projects }) {
            const mapRef = useRef(null);
            const mapInstanceRef = useRef(null);

            useEffect(() => {
                const initMap = async () => {
                    if (mapRef.current && !mapInstanceRef.current) {
                        const map = L.map(mapRef.current).setView([44.6488, -63.5752], 10);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap',
                            maxZoom: 19
                        }).addTo(map);
                        mapInstanceRef.current = map;

                        for (const project of projects) {
                            const coords = await geocodeAddress(project.address);
                            const color = project.status === '可开工' ? '#3fb950' : project.is_polaron ? '#ff8c42' : '#58a6ff';
                            
                            const icon = L.divIcon({
                                className: 'custom-marker',
                                html: `<div style="background:${color};width:32px;height:32px;border-radius:50%;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:13px;">${project.id}</div>`,
                                iconSize: [32, 32]
                            });

                            const marker = L.marker([coords.lat, coords.lng], { icon }).addTo(map);
                            marker.bindPopup(`<div style="color:#333;font-family:'DM Sans',sans-serif;min-width:200px;"><strong style="font-size:15px;display:block;margin-bottom:8px;">#${project.id} - ${project.team}</strong><div style="font-size:12px;line-height:1.6;"><div>📍 ${project.address}</div><div>🏗️ ${project.type}/${project.brand}</div><div>⏱️ ${project.duration}天</div><div>📊 <strong style="color:${project.status==='可开工'?'#3fb950':'#d29922'};">${project.status}</strong></div>${project.is_polaron?'<div style="color:#ff8c42;font-weight:600;">⚡ Polaron</div>':''}</div></div>`);
                        }
                    }
                };
                initMap();
                return () => {
                    if (mapInstanceRef.current) {
                        mapInstanceRef.current.remove();
                        mapInstanceRef.current = null;
                    }
                };
            }, [projects]);

            return (
                <div>
                    <h2 style={{marginBottom: '1rem'}}>🗺️ 项目地图</h2>
                    <p style={{color: 'var(--text-muted)', marginBottom: '1.5rem'}}>💡 OpenStreetMap免费地图 + Nominatim地理编码</p>
                    <div className="map-container"><div ref={mapRef} id="map"></div></div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
